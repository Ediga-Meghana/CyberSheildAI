{% extends "base.html" %}
{% block title %}Register{% endblock %}

{% block content %}
<div class="auth-container fade-in">
    <div class="glass-card auth-card">
        <div class="auth-header">
            <h2>Create Account</h2>
            <p>Join CyberShield AI to start detecting cyberbullying</p>
        </div>

        <form method="POST" action="/register" id="registerForm">
            <div class="form-group">
                <label class="form-label" for="username">Username</label>
                <input type="text" id="username" name="username" class="form-input" placeholder="Choose a username"
                    required minlength="3" autocomplete="username">
            </div>

            <div class="form-group">
                <label class="form-label" for="email">Email</label>
                <input type="email" id="email" name="email" class="form-input" placeholder="Enter your email" required
                    autocomplete="email">
            </div>

            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <input type="password" id="password" name="password" class="form-input"
                    placeholder="Create a password (min 6 chars)" required minlength="6" autocomplete="new-password">
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 0.5rem;">
                🚀 Create Account
            </button>
        </form>

        <div class="auth-footer">
            Already have an account? <a href="/login">Login here</a>
        </div>
    </div>
</div>
{% endblock %}
